<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ContentAI Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet"/>
<script src="https://accounts.google.com/gsi/client" async></script>
<style>
:root{--bg:#0D0F14;--s1:#111318;--s2:#181B24;--s3:#1E2230;--bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.13);--tx:#F1F5F9;--mu:#94A3B8;--di:#64748B;--ac:#6366F1;--acl:#818CF8;--acd:rgba(99,102,241,.14);--gr:#10B981;--am:#F59E0B;--rd:#EF4444;--r:10px;--rs:6px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:"Inter",sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
button{cursor:pointer;font-family:inherit;transition:all .15s}input,textarea,select{font-family:inherit}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:100;padding:1rem}
.modal{background:var(--s1);border:1px solid var(--bd2);border-radius:14px;padding:2rem;width:100%;max-width:420px}
.modal-lg{max-width:560px}
.mod-title{font-family:"Syne",sans-serif;font-size:1.35rem;margin-bottom:4px}
.mod-sub{font-size:.85rem;color:var(--mu);margin-bottom:1.25rem}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:.9rem}
.field label{font-size:.75rem;font-weight:500;color:var(--mu);text-transform:uppercase;letter-spacing:.05em}
.field input,.field select,.field textarea{background:var(--s2);border:1px solid var(--bd2);border-radius:var(--rs);padding:10px 12px;color:var(--tx);font-size:.875rem}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--ac)}
.btn-p{width:100%;padding:11px;background:var(--ac);color:#fff;border:none;border-radius:var(--rs);font-size:.9rem;font-weight:500}
.btn-p:hover{background:var(--acl)}.btn-p:disabled{opacity:.5;cursor:not-allowed}
.mod-sw{text-align:center;margin-top:.9rem;font-size:.83rem;color:var(--mu)}
.mod-sw a{color:var(--acl);cursor:pointer}
.mod-err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#FCA5A5;border-radius:var(--rs);padding:9px 12px;font-size:.83rem;margin-bottom:.9rem}
.sso-google{width:100%;padding:10px;background:var(--s2);border:1px solid var(--bd2);border-radius:var(--rs);font-size:.88rem;color:var(--tx);display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px}
.sso-google:hover{background:var(--s3);border-color:var(--bd2)}
.sso-google svg{width:18px;height:18px;flex-shrink:0}
.or-div{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.or-div span{font-size:12px;color:var(--di)}
.or-div::before,.or-div::after{content:"";flex:1;height:0.5px;background:var(--bd2)}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:56px;border-bottom:1px solid var(--bd);position:sticky;top:0;background:rgba(13,15,20,.92);backdrop-filter:blur(12px);z-index:50}
.logo{font-family:"Syne",sans-serif;font-size:1.05rem;font-weight:700}
.logo span{color:var(--acl)}
.ubar{display:flex;align-items:center;gap:8px}
.pbadge{font-size:.68rem;padding:2px 10px;border-radius:99px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.pbadge.free{background:rgba(148,163,184,.1);color:var(--mu);border:1px solid var(--bd)}
.pbadge.starter{background:rgba(99,102,241,.14);color:var(--acl);border:1px solid rgba(99,102,241,.25)}
.pbadge.pro{background:rgba(245,158,11,.13);color:#FCD34D;border:1px solid rgba(245,158,11,.22)}
.pbadge.agency{background:rgba(16,185,129,.13);color:#6EE7B7;border:1px solid rgba(16,185,129,.22)}
.btn-sm{padding:5px 13px;border-radius:var(--rs);font-size:.78rem;font-weight:500;border:1px solid var(--bd2);background:transparent;color:var(--mu)}
.btn-sm:hover{color:var(--tx);background:var(--s2)}
.btn-up{background:var(--ac);border-color:var(--ac);color:#fff}.btn-up:hover{background:var(--acl)}
.al{display:flex;min-height:calc(100vh - 56px)}
.sb{width:215px;border-right:1px solid var(--bd);padding:1rem .75rem;flex-shrink:0;display:flex;flex-direction:column}
.nsec{font-size:.68rem;font-weight:600;color:var(--di);text-transform:uppercase;letter-spacing:.07em;padding:0 10px;margin:1rem 0 5px}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--rs);font-size:.845rem;color:var(--mu);cursor:pointer;border:none;background:none;width:100%;text-align:left;margin-bottom:1px}
.ni:hover{color:var(--tx);background:var(--s2)}.ni.on{color:var(--tx);background:var(--s3);font-weight:500}
.ni svg{width:15px;height:15px;flex-shrink:0}
.ni .pill{margin-left:auto;font-size:.58rem;padding:2px 6px;border-radius:99px;background:var(--ac);color:#fff;font-weight:700}
.ub{margin-top:auto;padding:.9rem;background:var(--s2);border:1px solid var(--bd);border-radius:var(--rs)}
.ul{font-size:.72rem;color:var(--mu);margin-bottom:5px}
.ubg{background:var(--s3);border-radius:99px;height:4px;overflow:hidden;margin-bottom:5px}
.ubf{height:100%;border-radius:99px;background:var(--ac);transition:width .3s}
.ubf.warn{background:var(--am)}.ubf.full{background:var(--rd)}
.uc{font-size:.72rem;color:var(--mu)}
.upbtn{width:100%;margin-top:8px;padding:6px;background:var(--ac);border:none;color:#fff;border-radius:var(--rs);font-size:.78rem;font-weight:500}
.mn{flex:1;padding:1.75rem;overflow-y:auto;max-width:920px}
.pg-title{font-family:"Syne",sans-serif;font-size:1.1rem;font-weight:700;margin-bottom:3px}
.pg-sub{font-size:.83rem;color:var(--mu);margin-bottom:1.5rem}
.blbl{font-size:.7rem;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
/* multi-platform grid */
.pgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-bottom:1.4rem}
.pb{display:flex;flex-direction:column;align-items:center;gap:4px;padding:9px 5px;border:1px solid var(--bd);border-radius:var(--rs);background:var(--s1);font-size:.68rem;font-weight:500;color:var(--mu);cursor:pointer;position:relative}
.pb:hover{border-color:var(--bd2);color:var(--tx)}.pb.on{border-color:var(--ac);background:var(--acd);color:var(--acl)}
.pb svg{width:18px;height:18px}
.pb .chk{position:absolute;top:4px;right:4px;width:14px;height:14px;border-radius:99px;background:var(--ac);color:#fff;font-size:9px;display:none;align-items:center;justify-content:center;font-weight:700}
.pb.on .chk{display:flex}
.plat-count{font-size:.72rem;color:var(--acl);margin-bottom:.75rem;display:flex;align-items:center;gap:6px}
/* result tabs */
.rtabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.rtab{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:99px;border:1px solid var(--bd2);background:var(--s2);font-size:.78rem;color:var(--mu);cursor:pointer}
.rtab:hover{color:var(--tx)}.rtab.on{background:var(--acd);border-color:var(--ac);color:var(--acl);font-weight:500}
.rtab svg{width:14px;height:14px}
/* 2-col / 3-col */
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
.r3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:1rem}
.sw{display:flex;flex-direction:column;gap:5px}
.sw label{font-size:.75rem;color:var(--mu)}
.sw select,.sw input{background:var(--s1);border:1px solid var(--bd2);border-radius:var(--rs);padding:9px 11px;color:var(--tx);font-size:.85rem}
.sw select:focus,.sw input:focus{outline:none;border-color:var(--ac)}
.tw{display:flex;flex-direction:column;gap:5px;margin-bottom:1.2rem}
.tw label{font-size:.75rem;color:var(--mu)}
.tw textarea{background:var(--s1);border:1px solid var(--bd2);border-radius:var(--rs);padding:11px;color:var(--tx);font-size:.85rem;resize:vertical;line-height:1.65}
.tw textarea:focus{outline:none;border-color:var(--ac)}
/* media attachment */
.media-zone{border:1.5px dashed var(--bd2);border-radius:var(--rs);padding:14px;margin-bottom:1.2rem;text-align:center;cursor:pointer;transition:all .15s}
.media-zone:hover,.media-zone.drag{border-color:var(--ac);background:var(--acd)}
.media-zone-inner{font-size:.82rem;color:var(--di);display:flex;align-items:center;justify-content:center;gap:8px}
.media-zone-inner svg{width:18px;height:18px}
.media-preview{margin-top:10px;position:relative;display:inline-block}
.media-preview img,.media-preview video{max-width:100%;max-height:200px;border-radius:var(--rs);border:1px solid var(--bd2)}
.media-clear{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.7);border:none;color:#fff;font-size:13px;display:flex;align-items:center;justify-content:center;cursor:pointer}
/* brand selector */
.bsel{display:flex;align-items:center;gap:8px;margin-bottom:1.2rem;padding:10px;background:var(--s2);border-radius:var(--rs);border:1px solid var(--bd)}
.bsel-lbl{font-size:.75rem;color:var(--mu);flex-shrink:0}
.bsel select{background:var(--s1);border:1px solid var(--bd2);border-radius:var(--rs);padding:5px 10px;color:var(--tx);font-size:.8rem;flex:1}
.bsel-active{font-size:.72rem;color:var(--acl);flex-shrink:0}
/* gen button */
.gbtn{display:inline-flex;align-items:center;gap:7px;padding:10px 20px;background:var(--ac);border:none;color:#fff;border-radius:var(--rs);font-size:.875rem;font-weight:500}
.gbtn:hover:not(:disabled){background:var(--acl)}.gbtn:disabled{opacity:.5;cursor:not-allowed}
/* output card */
.ocard{background:var(--s1);border:1px solid var(--bd2);border-radius:var(--r);padding:1.25rem;margin-top:1.2rem}
.ohd{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.olbl{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--mu)}
.oacts{display:flex;gap:6px}
.bico{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:var(--rs);font-size:.77rem;border:1px solid var(--bd2);background:transparent;color:var(--mu)}
.bico:hover{color:var(--tx);background:var(--s2)}
.bico svg{width:12px;height:12px}
.otxt{font-size:.85rem;line-height:1.75;color:var(--tx);white-space:pre-wrap}
.rbar{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--bd)}
.rbtn{font-size:.73rem;padding:4px 11px;border-radius:99px;border:1px solid var(--bd2);background:var(--s2);color:var(--mu);cursor:pointer}
.rbtn:hover{color:var(--tx);border-color:var(--bd2)}.rbtn:disabled{opacity:.4;cursor:not-allowed}
.media-attach-preview{margin-top:10px;padding-top:10px;border-top:1px solid var(--bd);display:flex;align-items:center;gap:8px}
.map-thumb{width:48px;height:48px;border-radius:5px;object-fit:cover;border:1px solid var(--bd2)}
.map-lbl{font-size:.78rem;color:var(--mu)}
.map-rm{border:none;background:none;color:var(--mu);cursor:pointer;font-size:.8rem}
.map-rm:hover{color:var(--rd)}
/* quick schedule */
.day-sel-btns{display:flex;gap:6px;margin-bottom:1.2rem}
.day-btn{padding:7px 18px;border:1px solid var(--bd2);border-radius:var(--rs);background:var(--s1);color:var(--mu);font-size:.85rem;cursor:pointer}
.day-btn.on{background:var(--acd);border-color:var(--ac);color:var(--acl);font-weight:500}
.qs-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px;margin-top:1.2rem}
.qs-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--rs);padding:10px;min-height:140px;display:flex;flex-direction:column}
.qs-card.gen{border-color:rgba(99,102,241,.3)}
.qs-day{font-size:.72rem;font-weight:600;color:var(--mu);margin-bottom:6px;display:flex;align-items:center;justify-content:space-between}
.qs-plat{display:flex;gap:3px;margin-bottom:6px;flex-wrap:wrap}
.qs-plat-tag{font-size:.6rem;padding:1px 5px;border-radius:3px;background:var(--acd);color:var(--acl);border:1px solid rgba(99,102,241,.2)}
.qs-txt{font-size:.7rem;color:var(--tx);line-height:1.5;flex:1;display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;overflow:hidden}
.qs-acts{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
/* social accounts */
.social-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.social-card{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:1rem}
.sc-hd{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sc-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sc-icon svg{width:20px;height:20px}
.sc-name{font-size:.9rem;font-weight:500;color:var(--tx)}
.sc-status{font-size:.72rem;margin-top:2px}
.sc-status.connected{color:var(--gr)}.sc-status.dc{color:var(--di)}
.sc-user{font-size:.78rem;color:var(--mu);margin-bottom:10px;padding:6px 8px;background:var(--s2);border-radius:4px}
.sc-btn{width:100%;padding:7px;border-radius:var(--rs);font-size:.8rem;font-weight:500;border:1px solid var(--bd2);background:transparent;color:var(--tx);margin-bottom:6px}
.sc-btn:hover{background:var(--s2)}
.sc-btn.connect{background:var(--ac);border-color:var(--ac);color:#fff}.sc-btn.connect:hover{background:var(--acl)}
.sc-btn.dc-btn{border-color:rgba(239,68,68,.2);color:rgba(239,68,68,.7)}.sc-btn.dc-btn:hover{color:var(--rd)}
.sc-note{font-size:.68rem;color:var(--di);line-height:1.5;margin-top:6px}
.sc-post-btn{width:100%;padding:6px;border-radius:var(--rs);font-size:.78rem;background:var(--gr);border:none;color:#fff;font-weight:500;display:flex;align-items:center;justify-content:center;gap:5px}
.sc-post-btn:hover{opacity:.9}
/* brand vault */
.brand-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:1.25rem}
.bcard{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:1rem}
.bcard.active{border-color:rgba(99,102,241,.4)}
.bc-name{font-weight:600;font-size:.95rem}.bc-niche{font-size:.75rem;color:var(--mu);margin-top:2px;margin-bottom:8px}
.bc-pers{display:inline-flex;font-size:.68rem;font-weight:600;padding:2px 9px;border-radius:99px;margin-bottom:8px;background:var(--acd);color:var(--acl);border:1px solid rgba(99,102,241,.2)}
.bc-acts{display:flex;gap:6px;flex-wrap:wrap}
.btn-use{font-size:.73rem;padding:4px 11px;border-radius:var(--rs);background:var(--ac);border:none;color:#fff}
.btn-use:hover{background:var(--acl)}
.btn-edit,.btn-del{font-size:.73rem;padding:4px 11px;border-radius:var(--rs);border:1px solid var(--bd2);background:transparent;color:var(--mu)}
.btn-edit:hover{color:var(--tx)}.btn-del{border-color:rgba(239,68,68,.2);color:rgba(239,68,68,.7)}.btn-del:hover{color:var(--rd)}
.add-brand-btn{display:flex;align-items:center;gap:7px;padding:9px 16px;border:1px dashed var(--bd2);border-radius:var(--rs);background:transparent;color:var(--mu);font-size:.83rem;width:100%;margin-bottom:1rem}
.add-brand-btn:hover{color:var(--tx);border-color:var(--bd2)}
.brand-form{background:var(--s1);border:1px solid var(--bd2);border-radius:var(--r);padding:1.25rem;margin-bottom:1.2rem}
/* calendar */
.wnav{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
.wlbl{flex:1;text-align:center;font-size:.88rem;font-weight:500}
.bnav{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border:1px solid var(--bd2);border-radius:var(--rs);background:var(--s1);color:var(--mu)}
.bnav:hover{color:var(--tx)}
.cgrid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:7px}
.cday{background:var(--s1);border:1px solid var(--bd);border-radius:var(--rs);padding:9px;min-height:120px;display:flex;flex-direction:column}
.cday.td{border-color:rgba(99,102,241,.35)}
.cdhd{font-size:.68rem;font-weight:500;color:var(--mu);margin-bottom:5px}
.cday.td .cdhd{color:var(--acl)}
.cevt{font-size:.62rem;padding:3px 5px;border-radius:3px;background:var(--s2);color:var(--tx);margin-bottom:3px;display:flex;justify-content:space-between;align-items:flex-start;gap:3px;line-height:1.4}
.cdel{border:none;background:none;color:var(--mu);cursor:pointer;padding:0;font-size:.85rem;line-height:1;flex-shrink:0}
.cadd{margin-top:auto;font-size:.62rem;color:var(--di);border:1px dashed var(--bd);border-radius:3px;padding:2px 5px;background:none;width:100%;text-align:left;cursor:pointer}
.cinp{width:100%;font-size:.67rem;padding:3px 6px;border:1px solid var(--bd2);border-radius:3px;background:var(--s2);color:var(--tx);margin-top:4px}
.cinp:focus{outline:none;border-color:var(--ac)}.crbtn{display:flex;gap:3px;margin-top:3px}.crbtn button{font-size:.6rem;padding:2px 6px;border-radius:3px;border:1px solid var(--bd);background:var(--s2);color:var(--mu)}
/* ideas */
.imetrow{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem}
.imet{background:var(--s2);border-radius:var(--rs);padding:.9rem;text-align:center}
.imv{font-size:1.4rem;font-weight:700;font-family:"Syne",sans-serif}.iml{font-size:.72rem;color:var(--mu);margin-top:2px}
.fpills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:1rem}
.fp{font-size:.75rem;padding:3px 12px;border-radius:99px;border:1px solid var(--bd);background:var(--s1);color:var(--mu);cursor:pointer}
.fp.on{background:var(--acd);border-color:rgba(99,102,241,.3);color:var(--acl)}
.igrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.icard{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r);padding:.9rem}
.ibadge{display:inline-flex;align-items:center;gap:4px;font-size:.68rem;font-weight:500;padding:2px 8px;border-radius:3px;margin-bottom:7px;background:var(--s2);color:var(--mu);border:1px solid var(--bd)}
.itxt{font-size:.78rem;color:var(--tx);line-height:1.65;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;overflow:hidden}
.iacts{display:flex;gap:5px}
/* repurposer */
.plat-checks{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.2rem}
.pchk{display:flex;align-items:center;gap:8px;padding:8px 11px;border:1px solid var(--bd);border-radius:var(--rs);cursor:pointer;font-size:.82rem;color:var(--mu)}
.pchk.on{border-color:var(--ac);background:var(--acd);color:var(--acl)}
.pchk svg{width:16px;height:16px;flex-shrink:0}
.rep-results{display:flex;flex-direction:column;gap:12px;margin-top:1.2rem}
.rep-card{background:var(--s1);border:1px solid var(--bd2);border-radius:var(--r);padding:1.1rem}
.rep-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.rep-plat{display:flex;align-items:center;gap:7px;font-size:.82rem;font-weight:500}
.rep-txt{font-size:.83rem;color:var(--tx);line-height:1.7;white-space:pre-wrap}
/* upgrade */
.upgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.ucard{background:var(--s2);border:1px solid var(--bd);border-radius:var(--rs);padding:.9rem;text-align:center}
.ucard.pop{border-color:rgba(99,102,241,.4)}
.ucn{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--mu);margin-bottom:3px}
.ucp{font-family:"Syne",sans-serif;font-size:1.25rem;font-weight:800;margin-bottom:3px}
.ucl{font-size:.7rem;color:var(--mu);margin-bottom:9px}
.ucb{width:100%;padding:6px;border:1px solid var(--bd2);border-radius:var(--rs);font-size:.77rem;font-weight:500;background:transparent;color:var(--tx)}
.ucb:hover{background:var(--s3)}.ucb.ac{background:var(--ac);border-color:var(--ac);color:#fff}.ucb.ac:hover{background:var(--acl)}
/* empty */
.empty{text-align:center;padding:3rem 1rem;color:var(--mu)}
.empty svg{width:32px;height:32px;display:block;margin:0 auto 10px;opacity:.35}
/* toast */
.tw-wrap{position:fixed;bottom:1.5rem;right:1.5rem;z-index:200;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{background:var(--s1);border:1px solid var(--bd2);border-radius:var(--rs);padding:9px 15px;font-size:.82rem;display:flex;align-items:center;gap:7px;animation:si .18s ease;pointer-events:all}
.toast.ok{border-color:rgba(16,185,129,.3);color:#6EE7B7}
@keyframes si{from{transform:translateX(16px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes bk{0%,80%,100%{opacity:.2}40%{opacity:1}}
.dots span{display:inline-block;animation:bk 1.2s infinite}.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
.div{height:1px;background:var(--bd);margin:1.25rem 0}
.info-banner{display:flex;gap:8px;background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.2);border-radius:var(--rs);padding:10px 12px;margin-bottom:1rem;font-size:.8rem;color:var(--acl);line-height:1.55}
.info-banner svg{width:16px;height:16px;flex-shrink:0;margin-top:1px}
</style>
</head>
<body>

<!-- Auth -->

<script>
const API='https://contentai-backend-production-44cc.up.railway.app';
const GOOGLE_CLIENT_ID='355859233983-6dv30p1331vd5dur5ctk69oveus7lakb.apps.googleusercontent.com'; // Add your Google Client ID here

const PLATS=[
 {id:'instagram',label:'Instagram'},{id:'tiktok',label:'TikTok'},{id:'youtube',label:'YouTube'},
 {id:'linkedin',label:'LinkedIn'},{id:'pinterest',label:'Pinterest'},{id:'twitter',label:'X / Twitter'},
];
const TYPES=[
 {id:'caption',label:'Caption'},{id:'hooks',label:'Viral hooks x5'},{id:'ideas',label:'Content ideas x5'},
 {id:'hashtags',label:'Hashtag set'},{id:'bio',label:'Profile bio'},{id:'cta',label:'Calls to action x5'},
 {id:'thread',label:'Thread / carousel'},{id:'script',label:'Video script'},
];
const TONES=[
 {id:'casual',label:'Casual & relatable'},{id:'professional',label:'Professional'},
 {id:'funny',label:'Funny & witty'},{id:'inspirational',label:'Inspirational'},
 {id:'educational',label:'Educational'},{id:'luxury',label:'Premium / luxury'},
 {id:'bold',label:'Bold & direct'},{id:'storytelling',label:'Storytelling'},
];
const PERSONAS=['Professional','Playful','Bold & edgy','Warm & nurturing','Educational','Luxury','Motivational','Conversational'];
const SOCIAL_PLATS=[
 {id:'instagram',label:'Instagram',color:'#E1306C',note:'Requires Meta Business API + App Review (free to apply)'},
 {id:'tiktok',label:'TikTok',color:'#000000',note:'Requires TikTok Developer account + Content Posting API'},
 {id:'linkedin',label:'LinkedIn',color:'#0A66C2',note:'Requires LinkedIn API + OAuth 2.0 app'},
 {id:'twitter',label:'X / Twitter',color:'#000000',note:'Requires X Developer account ($100/mo Basic tier)'},
 {id:'pinterest',label:'Pinterest',color:'#E60023',note:'Requires Pinterest API v5 + app approval'},
 {id:'youtube',label:'YouTube',color:'#FF0000',note:'Requires YouTube Data API v3 (free via Google Cloud)'},
];

let S={
 token:null,user:null,tab:'generator',
 selectedPlats:['instagram'],type:'caption',tone:'casual',topic:'',
 multiResults:{},activeResultTab:null,generating:false,refining:false,
 mediaFile:null,mediaPreview:null,mediaType:null,brandId:null,
 src:'',repPlats:['instagram','linkedin'],repResults:{},repurposing:false,
 qsTopic:'',qsDays:7,qsPlats:['instagram'],qsResults:null,qsScheduling:false,
 socialAccounts:{},
 brands:[],showBrandForm:false,editingBrandId:null,
 bf:{name:'',niche:'',audience:'',persona:'Professional',toneNotes:'',example:''},
 calOff:0,calEvts:{},addTo:null,addTxt:'',
 ideas:[],iFilter:'all',
};

let aMode='login';
document.getElementById('tog').addEventListener('click',toggleAuth);
document.getElementById('asub').addEventListener('click',doAuth);
document.getElementById('ipw').addEventListener('keydown',e=>{if(e.key==='Enter')doAuth();});

function toggleAuth(){aMode=aMode==='login'?'signup':'login';renderAuth();}
function renderAuth(){
 const l=aMode==='login';
 document.getElementById('mt').textContent=l?'Welcome back':'Create your account';
 document.getElementById('ms').textContent=l?'Sign in to ContentAI Studio':'10 free generations, no credit card';
 document.getElementById('asub').textContent=l?'Sign in':'Start free';
 document.getElementById('nf').style.display=l?'none':'flex';
 document.getElementById('msw').innerHTML=l?'No account? <a id="tog">Start free</a>':'Have an account? <a id="tog">Sign in</a>';
 document.getElementById('tog').addEventListener('click',toggleAuth);
 document.getElementById('aerr').style.display='none';
 if(GOOGLE_CLIENT_ID){
  document.getElementById('google-sso-btn').style.display='flex';
  document.getElementById('or-div').style.display='flex';
 }
}
async function doAuth(){
 const email=document.getElementById('iemail').value.trim();
 const pw=document.getElementById('ipw').value;
 const name=document.getElementById('iname')?.value?.trim();
 const err=document.getElementById('aerr');err.style.display='none';
 if(!email||!pw){err.textContent='Email and password required.';err.style.display='block';return;}
 const btn=document.getElementById('asub');btn.disabled=true;btn.textContent='Please wait...';
 try{
  const path=aMode==='login'?'/auth/login':'/auth/signup';
  const body=aMode==='login'?{email,password:pw}:{email,password:pw,name};
  const res=await fetch(API+path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const d=await res.json();
  if(!res.ok){err.textContent=d.error||'Something went wrong.';err.style.display='block';return;}
  S.token=d.token;S.user=d.user;
  document.getElementById('auth-ov').style.display='none';
  renderApp();
 }catch{err.textContent='Cannot connect to server. Check the API URL in app.html.';err.style.display='block';}
 finally{btn.disabled=false;renderAuth();}
}
document.getElementById('google-sso-btn').addEventListener('click',()=>{
 if(window.google&&GOOGLE_CLIENT_ID){
  google.accounts.id.prompt();
 } else {
  toast('Set up Google Client ID in app.html to enable Google sign-in.');
 }
});

function initGoogleSSO(){
 if(!window.google||!GOOGLE_CLIENT_ID)return;
 google.accounts.id.initialize({
  client_id:GOOGLE_CLIENT_ID,
  callback:async function(resp){
   try{
    const res=await fetch(API+'/auth/google',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:resp.credential})});
    const d=await res.json();
    if(!res.ok){const err=document.getElementById('aerr');err.textContent=d.error||'Google sign-in failed.';err.style.display='block';return;}
    S.token=d.token;S.user=d.user;
    document.getElementById('auth-ov').style.display='none';
    renderApp();
   }catch{toast('Google sign-in failed. Try email login.');}
  }
 });
}
window.addEventListener('load',()=>{setTimeout(initGoogleSSO,500);});

function renderApp(){renderUserBar();renderUsageBox();renderPage();}
function renderUserBar(){
 if(!S.user)return;
 const{name,plan}=S.user;
 document.getElementById('ubar').innerHTML=
  '<span class="pbadge '+(plan==='trial'?'free':plan)+'">'+(plan==='trial'?'free':plan)+'</span>'+
  '<span style="font-size:.82rem;color:var(--mu)">'+esc(name)+'</span>'+
  (plan!=='trial'?'<button class="btn-sm" onclick="openPortal()">Billing</button>':'<button class="btn-sm btn-up" onclick="openUp()">Upgrade</button>')+
  '<button class="btn-sm" onclick="logout()">Sign out</button>';
}
function renderUsageBox(){
 if(!S.user)return;
 const{usage,limit,plan}=S.user;const inf=limit===null;
 const pct=inf?0:Math.min((usage/limit)*100,100);const fc=pct>=100?'full':pct>=75?'warn':'';
 document.getElementById('ubx').innerHTML=
  '<div class="ul">Generations this month</div>'+
  (!inf?'<div class="ubg"><div class="ubf '+fc+'" style="width:'+pct+'%"></div></div>':'')+
  '<div class="uc">'+(inf?'unlimited':usage+' / '+limit+' used')+'</div>'+
  (plan==='trial'?'<button class="upbtn" onclick="openUp()">Upgrade plan</button>':'');
}
function go(tab,el){
 S.tab=tab;S.showBrandForm=false;
 document.querySelectorAll('.ni').forEach(b=>b.classList.toggle('on',b===el));
 renderPage();
}
function renderPage(){
 const m=document.getElementById('mn');
 if(S.tab==='generator')m.innerHTML=rGen();
 else if(S.tab==='schedule')m.innerHTML=rSchedule();
 else if(S.tab==='repurpose')m.innerHTML=rRepurpose();
 else if(S.tab==='social')m.innerHTML=rSocial();
 else if(S.tab==='brands')m.innerHTML=rBrands();
 else if(S.tab==='calendar')m.innerHTML=rCal();
 else m.innerHTML=rIdeas();
 wire();
}

// ── Multi-platform generator ─────────────────────────────────────────────
function rGen(){
 const pbtns=PLATS.map(p=>'<div class="pb'+(S.selectedPlats.includes(p.id)?' on':'')+'" data-mp="'+p.id+'">'+platIco(p.id)+'<span>'+p.label+'</span><span class="chk">✓</span></div>').join('');
 const typSel=TYPES.map(t=>'<option value="'+t.id+'"'+(S.type===t.id?' selected':'')+'>'+t.label+'</option>').join('');
 const tonSel=TONES.map(t=>'<option value="'+t.id+'"'+(S.tone===t.id?' selected':'')+'>'+t.label+'</option>').join('');
 const brandOpts='<option value="">No brand voice</option>'+S.brands.map(b=>'<option value="'+b.id+'"'+(S.brandId===b.id?' selected':'')+'>'+esc(b.name)+'</option>').join('');
 const activeBrand=S.brands.find(b=>b.id===S.brandId);
 const bselHtml='<div class="bsel"><span class="bsel-lbl">Brand voice</span><select id="bsel">'+brandOpts+'</select>'+(activeBrand?'<span class="bsel-active">'+esc(activeBrand.name)+'</span>':'')+'</div>';
 const n=S.selectedPlats.length;
 const platCount=n>0?'<div class="plat-count"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>'+n+' platform'+(n>1?'s':'')+' selected — will generate for each simultaneously</div>':'<div class="plat-count" style="color:var(--rd)">Select at least one platform</div>';
 const mediaHtml=rMediaZone();
 const gbtn=S.generating?'<button class="gbtn" disabled><span class="dots"><span>.</span><span>.</span><span>.</span></span> Generating for '+S.selectedPlats.length+' platform'+(S.selectedPlats.length>1?'s':'')+'</button>':'<button class="gbtn" id="gbtn">Generate for all selected platforms</button>';
 const resultsHtml=rMultiResults();
 return '<div class="pg-title">Multi-platform content studio</div><div class="pg-sub">Select multiple platforms — AI generates optimised content for each one simultaneously.</div><div class="blbl">Select platforms (pick as many as you want)</div><div class="pgrid">'+pbtns+'</div>'+platCount+'<div class="div"></div>'+bselHtml+'<div class="r2"><div class="sw"><label>Content type</label><select id="tsel">'+typSel+'</select></div><div class="sw"><label>Tone</label><select id="nsel">'+tonSel+'</select></div></div><div class="tw"><label>Topic or niche</label><textarea id="tinp" rows="3" placeholder="e.g. healthy meal prep for busy professionals, product launch, sustainable fashion tips...">'+esc(S.topic)+'</textarea></div>'+mediaHtml+gbtn+resultsHtml;
}

function rMediaZone(){
 if(S.mediaPreview){
  const preview=S.mediaType==='video'?'<video src="'+S.mediaPreview+'" class="map-thumb" style="width:auto;height:48px" controls></video>':'<img src="'+S.mediaPreview+'" class="map-thumb"/>';
  return '<div class="media-attach-preview">'+preview+'<span class="map-lbl">'+esc(S.mediaFile?.name||'Media attached')+'</span><button class="map-rm" id="media-rm">Remove</button></div>';
 }
 return '<div class="media-zone" id="media-zone" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" ondrop="handleDrop(event)"><div class="media-zone-inner"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span>Click or drag to attach a photo or video to your post</span></div></div>';
}

function rMultiResults(){
 const keys=Object.keys(S.multiResults);if(keys.length===0)return'';
 const active=S.activeResultTab||S.selectedPlats.find(p=>S.multiResults[p])||keys[0];
 const tabs=S.selectedPlats.filter(p=>S.multiResults[p]).map(p=>{
  const pl=PLATS.find(x=>x.id===p);
  return'<button class="rtab'+(active===p?' on':'')+'" data-rt="'+p+'">'+platIco(p)+' '+(pl?.label||p)+'</button>';
 }).join('');
 const content=S.multiResults[active]||'';
 const refine=S.refining?'<span class="dots"><span>.</span><span>.</span><span>.</span></span> Refining...':'';
 const refinebtns=!S.refining?'<div class="rbar"><span style="font-size:.7rem;color:var(--di);margin-right:4px">Refine:</span><button class="rbtn" data-ref="shorter">Shorter</button><button class="rbtn" data-ref="punch">Punch up</button><button class="rbtn" data-ref="emoji">Add emoji</button><button class="rbtn" data-ref="cta">Stronger CTA</button><button class="rbtn" data-ref="formal">More formal</button><button class="rbtn" data-ref="casual">More casual</button></div>':'';
 const mediaRow=S.mediaPreview?'<div class="media-attach-preview">'+(S.mediaType==='video'?'<video src="'+S.mediaPreview+'" class="map-thumb" style="width:auto;height:36px" controls></video>':'<img src="'+S.mediaPreview+'" class="map-thumb"/>')+'<span class="map-lbl">Media attached</span></div>':'';
 return'<div class="ocard" style="margin-top:1.2rem"><div class="rtabs">'+tabs+'</div><div class="ohd"><span class="olbl">'+(refine||'Generated content — '+((PLATS.find(p=>p.id===active)?.label)||active))+'</span><div class="oacts"><button class="bico" id="copy-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Copy</button><button class="bico" id="save-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/></svg> Save</button><button class="bico" id="sched-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg> Schedule</button></div></div><div class="otxt">'+esc(content)+'</div>'+mediaRow+refinebtns+'</div>';
}

// ── Quick schedule ────────────────────────────────────────────────────────
function rSchedule(){
 const platCks=PLATS.map(p=>'<div class="pchk'+(S.qsPlats.includes(p.id)?' on':'')+'" data-qp="'+p.id+'">'+platIco(p.id)+' '+p.label+'</div>').join('');
 const dayBtns=[3,5,7].map(d=>'<button class="day-btn'+(S.qsDays===d?' on':'')+'" data-qd="'+d+'">'+d+' days</button>').join('');
 const brandOpts='<option value="">No brand voice</option>'+S.brands.map(b=>'<option value="'+b.id+'"'+(S.qsBrandId===b.id?' selected':'')+'>'+esc(b.name)+'</option>').join('');
 const gbtn=S.qsScheduling?'<button class="gbtn" style="width:100%" disabled><span class="dots"><span>.</span><span>.</span><span>.</span></span> Planning your week</button>':'<button class="gbtn" style="width:100%" id="qs-btn">Plan my week — generate '+S.qsDays+' days of content</button>';
 let gridHtml='';
 if(S.qsResults&&S.qsResults.length){
  const slices=S.qsResults.slice(0,S.qsDays);
  gridHtml='<div class="div"></div><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem"><div class="blbl" style="margin-bottom:0">'+slices.length+'-day content plan</div><button class="gbtn" style="font-size:.75rem;padding:6px 14px" id="qs-cal-btn">Push all to calendar</button></div><div class="qs-grid">'+slices.map((d,i)=>{

// ── Calendar ──────────────────────────────────────────────────────────────
function wkDays(off){const n=new Date(),m=new Date(n);m.setDate(n.getDate()-n.getDay()+1+(off||0)*7);return Array.from({length:7},(_,i)=>{const d=new Date(m);d.setDate(m.getDate()+i);return d;});}
function fmt(d){return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});}
function fmtS(d){return d.toLocaleDateString('en-US',{weekday:'short'});}
function dk(d){return d.toISOString().split('T')[0];}
function rCal(){
 const days=wkDays(S.calOff);const td=dk(new Date());
 const cols=days.map(d=>{const k=dk(d),evts=S.calEvts[k]||[],isT=k===td,adding=S.addTo===k;const evH=evts.map((ev,i)=>'<div class="cevt"><span>'+esc(ev.text)+'</span><button class="cdel" data-k="'+k+'" data-i="'+i+'">x</button></div>').join('');const addH=adding?'<input class="cinp" id="cinp" value="'+esc(S.addTxt)+'" placeholder="Post idea..."/><div class="crbtn"><button id="cok" data-k="'+k+'">Add</button><button id="cno">X</button></div>':'<button class="cadd" data-add="'+k+'">+ add</button>';return'<div class="cday'+(isT?' td':'')+'"><div class="cdhd">'+fmtS(d)+' '+d.getDate()+'</div>'+evH+addH+'</div>';}).join('');
 return'<div class="pg-title">Content calendar</div><div class="pg-sub" style="margin-bottom:1rem">Plan your posting schedule. Quick Schedule can fill this automatically.</div><div class="wnav"><button class="bnav" id="pw">←</button><span class="wlbl">'+fmt(days[0])+' to '+fmt(days[6])+'</span><button class="bnav" id="nw">→</button></div><div class="cgrid">'+cols+'</div>';
}

// ── Media ──────────────────────────────────────────────────────────────────
function handleMediaFile(file){
 if(!file)return;
 S.mediaFile=file;
 const reader=new FileReader();
 reader.onload=e=>{S.mediaPreview=e.target.result;S.mediaType=file.type.startsWith('video/')?'video':'image';renderPage();};
 reader.readAsDataURL(file);
}
function handleDrop(e){
 e.preventDefault();
 document.getElementById('media-zone')?.classList.remove('drag');
 const file=e.dataTransfer?.files?.[0];
 if(file&&(file.type.startsWith('image/')||file.type.startsWith('video/')))handleMediaFile(file);
 else toast('Please drop an image or video file.');
}

async function callAPI(prompt){
 const res=await fetch(API+'/generate',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+S.token},body:JSON.stringify({prompt:prompt})});
 const d=await res.json();
 if(res.status===402){openUp();throw new Error('limit');}
 if(!res.ok)throw new Error(d.error||'Generation failed');
 if(d.usage!=null&&S.user){S.user.usage=d.usage;S.user.limit=d.limit;renderUsageBox();}
 return d.content;
}

}

 const ti=document.getElementById('tinp');const topic=(ti?ti.value:S.topic).trim();
 if(!topic){toast('Enter a topic first.');return;}
 if(S.selectedPlats.length===0){toast('Select at least one platform.');return;}
 S.topic=topic;S.generating=true;S.multiResults={};S.activeResultTab=null;renderPage();
 const bc=brandCtx(S.brandId);
 try{
  await Promise.all(S.selectedPlats.map(async pid=>{
   const pl=(PLATS.find(p=>p.id===pid)||{label:pid}).label;
   const tn=(TONES.find(t=>t.id===S.tone)||{label:S.tone}).label;
   const pf=PROMPTS[S.type]||PROMPTS.caption;
   try{S.multiResults[pid]=await callAPI(pf(pl,topic,tn)+bc);}
   catch(e){if(e.message==='limit'){S.generating=false;renderPage();return;}S.multiResults[pid]='Error: '+e.message;}
  }));
 }finally{S.generating=false;S.activeResultTab=S.selectedPlats.find(p=>S.multiResults[p])||null;renderPage();}
}

const REFINES={
 shorter:'Make this significantly shorter (max 60% length) keeping the message:\n\n',
 punch:'Make this more compelling and punchy:\n\n',
 emoji:'Add relevant emojis throughout:\n\n',
 cta:'Rewrite with a much stronger call to action:\n\n',
 formal:'Rewrite in a more formal professional tone:\n\n',
 casual:'Rewrite in a more casual conversational tone:\n\n',
};

async function doRefine(type){
 const pid=S.activeResultTab||S.selectedPlats[0];const content=S.multiResults[pid];
 if(!content||S.refining)return;
 S.refining=true;renderPage();
 try{const r=await callAPI((REFINES[type]||'Improve this:\n\n')+content+brandCtx(S.brandId));S.multiResults[pid]=r;}
 catch(e){if(e.message!=='limit')toast('Error: '+e.message);}
 finally{S.refining=false;renderPage();}
}

async function doQuickSchedule(){
 const qsti=document.getElementById('qs-tinp');const topic=(qsti?qsti.value:S.qsTopic).trim();
 if(!topic){toast('Enter a topic first.');return;}
 if(S.qsPlats.length===0){toast('Select at least one platform.');return;}
 S.qsTopic=topic;S.qsScheduling=true;S.qsResults=null;renderPage();
 const plats=S.qsPlats.map(p=>(PLATS.find(x=>x.id===p)||{label:p}).label).join(', ');
 const bc=brandCtx(S.qsBrandId||null);
 const prompt='Generate '+S.qsDays+' days of content for '+plats+' about: '+topic+'.'+bc+'\n\nReturn a JSON array of exactly '+S.qsDays+' objects. Each must have: "day" (1-'+S.qsDays+'), "hook" (1 attention-grabbing sentence), "caption" (full platform-ready caption no hashtags), "hashtags" (10 hashtags string). Return ONLY valid JSON array, no markdown.';
 try{
  const raw=await callAPI(prompt);
  let parsed;
  try{parsed=JSON.parse(raw.replace(/```json|```/g,'').trim());}
  catch{parsed=Array.from({length:S.qsDays},(_,i)=>({day:i+1,hook:'',caption:'Day '+(i+1)+': '+topic,hashtags:''}));}
  S.qsResults=parsed;
 }catch(e){if(e.message!=='limit')toast('Error: '+e.message);}
 finally{S.qsScheduling=false;renderPage();}
}

function qsPushToCalendar(){
 if(!S.qsResults)return;
 const days=wkDays(S.calOff);
 const ev=Object.assign({},S.calEvts);
 S.qsResults.forEach(function(d,i){
  if(i>=days.length)return;
  const k=dk(days[i]);
  const txt=(d.hook?d.hook+' ':'')+d.caption;
  const platLabel=S.qsPlats.map(p=>(PLATS.find(x=>x.id===p)||{label:p}).label).join('+');
  ev[k]=(ev[k]||[]).concat({text:'['+platLabel+'] '+txt});
 });
 S.calEvts=ev;
 toast(S.qsResults.length+' posts added to calendar!','ok');
 go('calendar',document.querySelector('[data-tab="calendar"]'));
}

async function doRepurpose(){
 const si=document.getElementById('srcinp');const src=(si?si.value:S.src).trim();
 if(!src){toast('Paste some content first.');return;}
 if(S.repPlats.length===0){toast('Select at least one platform.');return;}
 S.src=src;S.repurposing=true;S.repResults={};renderPage();
 try{
  await Promise.all(S.repPlats.map(async function(pid){
   const plLabel=(PLATS.find(p=>p.id===pid)||{label:pid}).label;
   const prompt='Repurpose the following content for '+plLabel+'. Adapt format, length, style to fit '+plLabel+' perfectly. Output only the repurposed content.\n\n'+src;
   try{S.repResults[pid]=await callAPI(prompt);}catch(e){S.repResults[pid]='Error: '+e.message;}
  }));
 }finally{S.repurposing=false;renderPage();}
}

function connectSocial(pid){
 const p=SOCIAL_PLATS.find(x=>x.id===pid);
 toast('To connect '+p.label+': '+p.note+' — check our docs for the full setup guide.');
}
function postFromIdeas(pid){
 const platIdeas=S.ideas.filter(x=>x.plat===pid);
 if(platIdeas.length===0){toast('No saved ideas for '+pid+'. Generate and save some first.');return;}
 toast('Post scheduling coming soon — connect your '+pid+' API to enable direct posting.');
}

function saveIdea(plat,type,text){
 S.ideas=[{plat:plat,type:type,text:text,mediaPreview:S.mediaPreview||null}].concat(S.ideas);
 toast('Saved to ideas bank!','ok');
}
function saveBrand(){
 const name=(document.getElementById('bfname')||{value:''}).value.trim();
 const niche=(document.getElementById('bfniche')||{value:''}).value.trim();
 const audience=(document.getElementById('bfaud')||{value:''}).value.trim();
 const persona=(document.getElementById('bfpers')||{value:'Professional'}).value;
 const toneNotes=(document.getElementById('bftone')||{value:''}).value.trim();
 const example=(document.getElementById('bfex')||{value:''}).value.trim();
 if(!name||!niche||!audience){toast('Name, niche and audience are required.');return;}
 if(S.editingBrandId){S.brands=S.brands.map(b=>b.id===S.editingBrandId?Object.assign({},b,{name,niche,audience,persona,toneNotes,example}):b);}
 else{S.brands=S.brands.concat({id:'b_'+Date.now(),name,niche,audience,persona,toneNotes,example});}
 S.showBrandForm=false;S.editingBrandId=null;toast('Brand "'+name+'" saved!','ok');renderPage();
}

async function openPortal(){try{const r=await fetch(API+'/billing/portal',{method:'POST',headers:{'Authorization':'Bearer '+S.token}});const d=await r.json();if(d.url)window.location.href=d.url;}catch{toast('Could not open billing portal.');}}
function logout(){S.token=null;S.user=null;document.getElementById('auth-ov').style.display='flex';}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
